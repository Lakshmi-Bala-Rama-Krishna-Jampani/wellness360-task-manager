services:
  task-manager-api:
    build: .
    container_name: task-manager-api
    ports:
      - "8080:8080"
    environment:
      APP_SECURITY_USERNAME: admin
      APP_SECURITY_PASSWORD: admin123
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
